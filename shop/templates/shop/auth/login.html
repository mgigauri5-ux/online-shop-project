{% extends "shop/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow p-4 mt-5 border-0 rounded-4">
            <h3 class="text-center mb-4 fw-bold text-primary">ავტორიზაცია</h3>
            
            {% if message %}
                <div class="alert alert-danger small py-2 text-center">{{ message }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">ელ-ფოსტა</label>
                    <input type="email" name="email" class="form-control rounded-pill px-3" required placeholder="example@mail.com">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">პაროლი</label>
                    <input type="password" name="password" class="form-control rounded-pill px-3" required placeholder="******">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm">შესვლა</button>
            </form>
            
            <p class="mt-3 text-center small text-muted">
                ჯერ არ გაქვთ ანგარიში? <a href="{% url 'shop:register' %}" class="text-primary fw-bold text-decoration-none">რეგისტრაცია</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
